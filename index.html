<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robotic Perception Study Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Robotic Perception Study Hub</h1>
        <p class="subtitle">Interactive learning for sensors, computer vision, SLAM, and more</p>
    </header>

    <nav id="main-nav">
        <button class="nav-btn active" data-section="topics">Topics</button>
        <button class="nav-btn" data-section="flashcards">Flashcards</button>
        <button class="nav-btn" data-section="quiz">Quiz</button>
        <button class="nav-btn" data-section="glossary">Glossary</button>
    </nav>

    <!-- TOPICS SECTION -->
    <main id="topics" class="section active">
        <div class="topic-grid" id="topic-grid"></div>
        <div id="topic-detail" class="topic-detail hidden">
            <button class="back-btn" id="back-to-topics">&larr; Back to Topics</button>
            <div id="topic-content"></div>
        </div>
    </main>

    <!-- FLASHCARDS SECTION -->
    <section id="flashcards" class="section hidden">
        <div class="flashcard-controls">
            <label for="fc-category">Category:</label>
            <select id="fc-category"></select>
            <button id="fc-shuffle">Shuffle</button>
        </div>
        <div class="flashcard-container">
            <div class="flashcard" id="flashcard">
                <div class="flashcard-inner" id="flashcard-inner">
                    <div class="flashcard-front" id="fc-front"></div>
                    <div class="flashcard-back" id="fc-back"></div>
                </div>
            </div>
            <p class="fc-hint">Click card to flip</p>
        </div>
        <div class="flashcard-nav">
            <button id="fc-prev">&larr; Prev</button>
            <span id="fc-counter">1 / 1</span>
            <button id="fc-next">Next &rarr;</button>
        </div>
        <div class="progress-bar-container">
            <div class="progress-bar" id="fc-progress"></div>
        </div>
    </section>

    <!-- QUIZ SECTION -->
    <section id="quiz" class="section hidden">
        <div class="quiz-setup" id="quiz-setup">
            <h2>Test Your Knowledge</h2>
            <label for="quiz-category">Category:</label>
            <select id="quiz-category"></select>
            <label for="quiz-count">Questions:</label>
            <select id="quiz-count">
                <option value="5">5</option>
                <option value="10" selected>10</option>
                <option value="20">20</option>
                <option value="0">All</option>
            </select>
            <button id="quiz-start" class="primary-btn">Start Quiz</button>
        </div>
        <div class="quiz-active hidden" id="quiz-active">
            <div class="quiz-header">
                <span id="quiz-progress">Question 1 / 10</span>
                <span id="quiz-score">Score: 0</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="quiz-bar"></div>
            </div>
            <div id="quiz-question" class="quiz-question"></div>
            <div id="quiz-options" class="quiz-options"></div>
            <div id="quiz-feedback" class="quiz-feedback hidden"></div>
            <button id="quiz-next-btn" class="primary-btn hidden">Next Question</button>
        </div>
        <div class="quiz-results hidden" id="quiz-results">
            <h2>Quiz Complete!</h2>
            <div id="quiz-final-score" class="final-score"></div>
            <div id="quiz-review"></div>
            <button id="quiz-restart" class="primary-btn">Try Again</button>
        </div>
    </section>

    <!-- GLOSSARY SECTION -->
    <section id="glossary" class="section hidden">
        <div class="glossary-search">
            <input type="text" id="glossary-input" placeholder="Search terms...">
        </div>
        <div id="glossary-list" class="glossary-list"></div>
    </section>

    <footer>
        <p>Robotic Perception Study Hub &mdash; Built for learning</p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
